<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Deutsch Lernen</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0D0C14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Deutsch">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0D0C14;--surface:#16141F;--surface2:#1E1C2A;
    --border:rgba(255,255,255,0.07);
    --orange:#FF6B35;--mint:#00E5C3;--violet:#A78BFA;--rose:#FB7185;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:env(safe-area-inset-top,0) 0 40px}
  .hub{width:100%;max-width:420px;padding:0 20px}
  .hub-header{text-align:center;padding:52px 0 36px}
  .hub-logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:6px;background:linear-gradient(135deg,var(--violet) 0%,var(--mint) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
  .hub-subtitle{font-size:.72rem;font-weight:700;letter-spacing:4px;color:rgba(255,255,255,.25);text-transform:uppercase}
  .hub-divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .hub-divider::before,.hub-divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .hub-divider span{font-size:.65rem;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.18);text-transform:uppercase;white-space:nowrap}
  .app-list{display:flex;flex-direction:column;gap:14px}
  .app-card{display:flex;align-items:center;gap:18px;padding:22px 20px;background:var(--surface);border:1px solid var(--border);border-radius:20px;text-decoration:none;color:#fff;cursor:pointer;transition:all .22s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
  .app-card::before{content:'';position:absolute;inset:0;border-radius:20px;background:radial-gradient(ellipse at 0% 50%,var(--card-glow,rgba(167,139,250,.06)) 0%,transparent 70%);pointer-events:none}
  .app-card:hover{transform:translateY(-3px);border-color:var(--card-border,rgba(167,139,250,.35));box-shadow:0 12px 40px rgba(0,0,0,.4)}
  .app-card:active{transform:scale(.98)}
  .app-icon{font-size:2.2rem;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:14px;border:1px solid var(--border);flex-shrink:0}
  .app-info{flex:1}
  .app-title{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:2px;line-height:1;margin-bottom:5px}
  .app-desc{font-size:.75rem;font-weight:600;color:rgba(255,255,255,.35);line-height:1.4}
  .app-arrow{font-size:1.4rem;color:rgba(255,255,255,.2);transition:all .2s;flex-shrink:0}
  .app-card:hover .app-arrow{color:rgba(255,255,255,.6);transform:translateX(3px)}
  .hub-msg{text-align:center;padding:40px 0;color:rgba(255,255,255,.3);font-size:.85rem;font-weight:600}
  .hub-footer{text-align:center;margin-top:36px;font-size:.62rem;letter-spacing:2px;color:rgba(255,255,255,.1);text-transform:uppercase;font-weight:700}
</style>
</head>
<body>
<div class="hub">
  <div class="hub-header">
    <div class="hub-logo">Deutsch Lernen</div>
    <div class="hub-subtitle">Choose an app to start</div>
  </div>
  <div class="hub-divider"><span>Apps</span></div>
  <div class="app-list" id="appList"><div class="hub-msg">Loading…</div></div>
  <div class="hub-footer">deutsch lernen · progress saved locally per app</div>
</div>
<script>
async function loadApps() {
  const list = document.getElementById('appList');
  try {
    const res  = await fetch('apps.json');
    const apps = await res.json();
    list.innerHTML = apps.map(app => `
      <a class="app-card" href="${app.file}"
         style="--card-glow:${app.color}18;--card-border:${app.color}55">
        <div class="app-icon">${app.icon}</div>
        <div class="app-info">
          <div class="app-title" style="color:${app.color}">${app.title}</div>
          <div class="app-desc">${app.description}</div>
        </div>
        <div class="app-arrow">›</div>
      </a>`).join('');
  } catch(e) {
    list.innerHTML = `<div class="hub-msg">Could not load apps.json</div>`;
  }
}
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
loadApps();
</script>
</body>
</html>
