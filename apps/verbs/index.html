<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chronos German — Verb Mastery</title>
    <link rel="manifest" href="../../manifest.json">
    <link rel="apple-touch-icon" href="../../assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="app-container">
        <div class="app-header">
            <div>
                <div class="app-title">Chronos</div>
                <span class="app-title-sub">German Verbs</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="btnProgress" title="Progress">📊</button>
            </div>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-card"><div class="stat-number gold" id="statTotal">0</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-number green" id="statMastered">0</div><div class="stat-label">Mastered</div></div>
            <div class="stat-card"><div class="stat-number blue" id="statStreak">0</div><div class="stat-label">Streak</div></div>
            <div class="stat-card"><div class="stat-number rose" id="statSession">0</div><div class="stat-label">Session</div></div>
        </div>

        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

        <div class="splash" id="splashScreen">
            <div class="splash-icon">⏳</div>
            <h2>Willkommen</h2>
            <p>Practice German verb conjugations. Type the forms, get instant feedback, and track your progress.</p>
            <button class="start-btn" id="btnStart">Start Practicing →</button>
        </div>

        <div class="main-content" id="mainContent">
            <div class="verb-card" id="verbCard">
                <div class="verb-badge" id="verbBadge"></div>
                <div class="verb-infinitive" id="verbInfinitive">—</div>
                <div class="verb-english" id="verbEnglish">—</div>
                <div class="conjugation-table" id="conjTable"></div>
            </div>

            <div class="verb-actions">
                <button class="action-btn check-btn" id="btnCheck">✓ Check</button>
                <button class="action-btn next-btn" id="btnNext" disabled>Next →</button>
            </div>

            <div class="msg-area" id="msgArea"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h3>📊 Progress</h3>
            <p id="modalBody">Loading...</p>
            <div class="modal-btns">
                <button class="modal-secondary" id="modalReset">Reset All</button>
                <button class="modal-primary" id="modalClose">Close</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
